name: farha_app
description: Farha — The Digital Atelier. Connecting tailors and customers.
publish_to: 'none'
version: 1.0.0+1

environment:
  sdk: '>=3.2.0 <4.0.0'

dependencies:
  flutter:
    sdk: flutter
  flutter_localizations:
    sdk: flutter

  # HTTP & networking
  dio: ^5.4.3
  connectivity_plus: ^7.1.0

  # State management
  flutter_riverpod: ^3.3.1

  # Navigation
  go_router: ^17.2.0

  # Secure storage & preferences
  flutter_secure_storage: ^10.0.0
  shared_preferences: ^2.2.3

  # Images
  image_picker: ^1.1.2
  cached_network_image: ^3.3.1

  # Firebase
  firebase_core: ^4.6.0
  firebase_messaging: ^16.1.3
  firebase_crashlytics: ^5.1.0

  # Local notifications (in-app banners + vibration)
  flutter_local_notifications: ^18.0.1

  # Google auth
  google_sign_in: ^7.2.0

  # Maps & location
  geolocator: ^14.0.2
  google_maps_flutter: ^2.6.1

  # Charts (revenue dashboard)
  fl_chart: ^1.2.0

  # Internationalization
  intl: 0.20.2

  # Animations
  lottie: ^3.1.0

  # OTP / PIN input
  pin_code_fields: ^9.3.0

  # Environment variables
  flutter_dotenv: ^6.0.0

  # Permissions
  permission_handler: ^12.0.1

  # Misc UI
  shimmer: ^3.0.0              # loading skeleton effect
  fluttertoast: ^9.0.0         # toast notifications
  url_launcher: ^6.3.0         # open URLs (terms, support)
  flutter_svg: ^2.0.10         # SVG icons
  state_notifier: ^1.0.0

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^6.0.0
  build_runner: ^2.4.8
  riverpod_generator: ^4.0.3
  flutter_launcher_icons: ^0.13.1

flutter_icons:
  android: true
  ios: true
  image_path: "assets/icon.png"

flutter:
  uses-material-design: true
  generate: true

  assets:
    - assets/images/
    - assets/icons/
    - assets/animations/
    - .env

  fonts:
    - family: PlusJakartaSans
      fonts:
        - asset: assets/fonts/PlusJakartaSans-Regular.ttf
        - asset: assets/fonts/PlusJakartaSans-Medium.ttf
          weight: 500
        - asset: assets/fonts/PlusJakartaSans-SemiBold.ttf
          weight: 600
        - asset: assets/fonts/PlusJakartaSans-Bold.ttf
          weight: 700
    - family: Inter
      fonts:
        - asset: assets/fonts/Inter-Regular.ttf
        - asset: assets/fonts/Inter-Medium.ttf
          weight: 500
        - asset: assets/fonts/Inter-SemiBold.ttf
          weight: 600
